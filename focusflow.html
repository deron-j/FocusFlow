<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FocusFlow — Stay Sharp</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --lime: #c8f533;
    --cyan: #00e5d4;
    --dark: #0d0f0e;
    --mid: #161a18;
    --panel: #1c2220;
    --border: #2a3230;
    --text: #e8ede9;
    --muted: #6a7a70;
    --lime-dim: rgba(200, 245, 51, 0.12);
    --cyan-dim: rgba(0, 229, 212, 0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BG ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,245,51,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,245,51,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── GLOW BLOBS ── */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: .35;
    animation: drift 14s ease-in-out infinite alternate;
  }
  .blob-1 { width: 420px; height: 420px; background: var(--lime); top: -100px; left: -120px; animation-delay: 0s; }
  .blob-2 { width: 320px; height: 320px; background: var(--cyan); bottom: -80px; right: -80px; animation-delay: -7s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  /* ── WRAPPER ── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .logo-mark {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    background: var(--lime);
    color: var(--dark);
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: .05em;
    animation: pulse-badge 3s ease-in-out infinite;
  }

  @keyframes pulse-badge {
    0%,100% { box-shadow: 0 0 0 0 rgba(200,245,51,.4); }
    50%      { box-shadow: 0 0 0 8px rgba(200,245,51,0); }
  }

  .logo-text {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.02em;
    color: var(--text);
  }

  .logo-text span { color: var(--lime); }

  .date-chip {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 100px;
    letter-spacing: .04em;
  }

  /* ── STATS ROW ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s, transform .2s;
  }

  .stat-card:hover { border-color: var(--lime); transform: translateY(-2px); }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-card.s-total::before { background: var(--muted); }
  .stat-card.s-done::before  { background: var(--lime); }
  .stat-card.s-pend::before  { background: var(--cyan); }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
  }

  .s-total .stat-value { color: var(--text); }
  .s-done  .stat-value { color: var(--lime); }
  .s-pend  .stat-value { color: var(--cyan); }

  /* PROGRESS BAR */
  .progress-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 32px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    align-items: center;
  }

  .progress-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
  }

  .progress-pct {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--lime);
  }

  .progress-track {
    height: 8px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--lime), var(--cyan));
    transition: width .5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 12px rgba(200,245,51,.5);
  }

  /* ── INPUT PANEL ── */
  .input-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 32px;
    transition: border-color .2s;
  }

  .input-panel:focus-within { border-color: var(--lime); }

  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: 18px;
    font-family: 'Space Mono', monospace;
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    margin-bottom: 12px;
  }

  .input-row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 12px;
  }

  input[type="text"],
  input[type="date"],
  select {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    width: 100%;
    transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus,
  input[type="date"]:focus,
  select:focus {
    border-color: var(--lime);
    box-shadow: 0 0 0 3px rgba(200,245,51,.15);
  }

  input::placeholder { color: var(--muted); }

  select option { background: var(--mid); }

  /* Priority dots on select */
  .priority-select {
    cursor: pointer;
  }

  .btn-add {
    background: var(--lime);
    color: var(--dark);
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    padding: 12px 24px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform .15s, box-shadow .15s;
    letter-spacing: -.01em;
  }

  .btn-add:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(200,245,51,.35);
  }

  .btn-add:active { transform: translateY(0); }

  /* ── FILTER ROW ── */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .filter-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 5px 14px;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .04em;
  }

  .filter-btn:hover { border-color: var(--lime); color: var(--text); }

  .filter-btn.active {
    background: var(--lime);
    color: var(--dark);
    border-color: var(--lime);
    font-weight: 700;
  }

  /* ── TASK LIST ── */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .task-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: center;
    transition: border-color .2s, transform .2s, opacity .3s;
    animation: slide-in .3s ease both;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-item:hover { border-color: var(--border); transform: translateX(4px); }
  .task-item.done  { opacity: .5; }
  .task-item.done .task-name { text-decoration: line-through; color: var(--muted); }

  /* custom checkbox */
  .check-wrap {
    position: relative;
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  .check-wrap input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    z-index: 2;
    margin: 0;
    padding: 0;
  }

  .check-box {
    position: absolute;
    inset: 0;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: var(--mid);
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .check-wrap input:checked ~ .check-box {
    background: var(--lime);
    border-color: var(--lime);
  }

  .check-box::after {
    content: '';
    width: 6px;
    height: 10px;
    border-right: 2px solid var(--dark);
    border-bottom: 2px solid var(--dark);
    transform: rotate(45deg) translateY(-2px);
    opacity: 0;
    transition: opacity .15s;
  }

  .check-wrap input:checked ~ .check-box::after { opacity: 1; }

  .task-body { min-width: 0; }

  .task-name {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color .2s;
  }

  .task-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 2px 9px;
    border-radius: 100px;
    letter-spacing: .04em;
    font-weight: 700;
  }

  .tag-cat {
    background: var(--cyan-dim);
    color: var(--cyan);
    border: 1px solid rgba(0,229,212,.2);
  }

  .tag-date {
    background: rgba(255,255,255,.04);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .tag-priority-high { background: rgba(255,80,80,.12); color: #ff6060; border: 1px solid rgba(255,80,80,.2); }
  .tag-priority-med  { background: rgba(255,180,0,.10); color: #ffb800; border: 1px solid rgba(255,180,0,.2); }
  .tag-priority-low  { background: var(--lime-dim); color: var(--lime); border: 1px solid rgba(200,245,51,.2); }

  .task-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .btn-delete {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }

  .btn-delete:hover { border-color: #ff6060; color: #ff6060; background: rgba(255,80,80,.08); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: .04em;
    border: 1px dashed var(--border);
    border-radius: 20px;
    animation: slide-in .4s ease;
  }

  .empty-icon {
    font-size: 36px;
    margin-bottom: 12px;
    display: block;
    filter: grayscale(1);
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    margin-top: 60px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .08em;
  }

  footer span { color: var(--lime); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--lime);
    color: var(--dark);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 100px;
    box-shadow: 0 8px 32px rgba(200,245,51,.4);
    z-index: 100;
    transform: translateY(20px);
    opacity: 0;
    transition: all .3s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
    letter-spacing: .04em;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(3, 1fr); }
    .input-row-2 { grid-template-columns: 1fr 1fr; }
    .input-row-2 .btn-add { grid-column: 1 / -1; }
    .stat-value { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <span class="logo-mark">FF</span>
      <span class="logo-text">Focus<span>Flow</span></span>
    </div>
    <span class="date-chip" id="dateChip"></span>
  </header>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card s-total">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card s-done">
      <div class="stat-label">Done</div>
      <div class="stat-value" id="statDone">0</div>
    </div>
    <div class="stat-card s-pend">
      <div class="stat-label">Pending</div>
      <div class="stat-value" id="statPend">0</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-meta">
      <span class="progress-label">Overall Progress</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-panel">
    <div class="panel-title">// New Task</div>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="What do you need to get done?" maxlength="100" />
    </div>
    <div class="input-row-2">
      <select id="categorySelect">
        <option value="">— Category —</option>
        <option value="Academics">📚 Academics</option>
        <option value="Assignment">✏️ Assignment</option>
        <option value="Exam Prep">🎯 Exam Prep</option>
        <option value="Project">🛠 Project</option>
        <option value="Personal">🌱 Personal</option>
        <option value="Health">💪 Health</option>
        <option value="Finance">💰 Finance</option>
        <option value="Social">🤝 Social</option>
        <option value="Other">📌 Other</option>
      </select>
      <select id="prioritySelect" class="priority-select">
        <option value="low">🟢 Low</option>
        <option value="med" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <input type="date" id="dateInput" />
      <button class="btn-add" onclick="addTask()">+ Add</button>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-row">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    <button class="filter-btn" onclick="setFilter('high', this)">🔴 High</button>
    <button class="filter-btn" onclick="setFilter('Academics', this)">📚 Academics</button>
    <button class="filter-btn" onclick="setFilter('Exam Prep', this)">🎯 Exams</button>
  </div>

  <!-- TASK LIST -->
  <div class="task-list" id="taskList"></div>

  <footer>Built with <span>FocusFlow</span> · Stay sharp, stay ahead.</footer>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ── STATE ──────────────────────────────────────────────────
  let tasks = JSON.parse(localStorage.getItem('ff_tasks') || '[]');
  let filter = 'all';

  // ── DATE CHIP ─────────────────────────────────────────────
  const dateChip = document.getElementById('dateChip');
  const now = new Date();
  dateChip.textContent = now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' }).toUpperCase();

  // Set default date to today
  document.getElementById('dateInput').valueAsDate = new Date();

  // ── SAVE ──────────────────────────────────────────────────
  function save() {
    localStorage.setItem('ff_tasks', JSON.stringify(tasks));
  }

  // ── ADD TASK ──────────────────────────────────────────────
  function addTask() {
    const name = document.getElementById('taskInput').value.trim();
    if (!name) { showToast('⚠ Please enter a task name'); return; }

    const task = {
      id: Date.now(),
      name,
      category: document.getElementById('categorySelect').value || 'Other',
      priority: document.getElementById('prioritySelect').value,
      date: document.getElementById('dateInput').value,
      done: false,
      created: new Date().toISOString()
    };

    tasks.unshift(task);
    save();
    render();
    document.getElementById('taskInput').value = '';
    document.getElementById('taskInput').focus();
    showToast('✓ Task added!');
  }

  // Enter key to add
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // ── TOGGLE DONE ───────────────────────────────────────────
  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  // ── DELETE ────────────────────────────────────────────────
  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
    showToast('🗑 Task removed');
  }

  // ── FILTER ────────────────────────────────────────────────
  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ── RENDER ────────────────────────────────────────────────
  function render() {
    // Stats
    const total = tasks.length;
    const done  = tasks.filter(t => t.done).length;
    const pend  = total - done;
    const pct   = total ? Math.round((done / total) * 100) : 0;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statDone').textContent  = done;
    document.getElementById('statPend').textContent  = pend;
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';

    // Filter
    let filtered = [...tasks];
    if (filter === 'pending') filtered = tasks.filter(t => !t.done);
    else if (filter === 'done') filtered = tasks.filter(t => t.done);
    else if (filter === 'high') filtered = tasks.filter(t => t.priority === 'high');
    else if (filter !== 'all') filtered = tasks.filter(t => t.category === filter);

    const list = document.getElementById('taskList');

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <span class="empty-icon">🎯</span>
          ${filter === 'all' ? 'No tasks yet. Add one above to get started!' : 'No tasks match this filter.'}
        </div>`;
      return;
    }

    // Sort: pending first, then by priority
    const prioOrder = { high: 0, med: 1, low: 2 };
    filtered.sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return (prioOrder[a.priority] || 1) - (prioOrder[b.priority] || 1);
    });

    list.innerHTML = filtered.map(t => {
      const prioTag = `<span class="tag tag-priority-${t.priority}">${
        t.priority === 'high' ? '🔴 HIGH' : t.priority === 'med' ? '🟡 MED' : '🟢 LOW'
      }</span>`;
      const dateStr = t.date ? `<span class="tag tag-date">📅 ${formatDate(t.date)}</span>` : '';
      const catStr  = t.category ? `<span class="tag tag-cat">${t.category}</span>` : '';

      return `
        <div class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
          <label class="check-wrap">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleDone(${t.id})" />
            <div class="check-box"></div>
          </label>
          <div class="task-body">
            <div class="task-name">${escHtml(t.name)}</div>
            <div class="task-meta">${catStr}${prioTag}${dateStr}</div>
          </div>
          <div class="task-actions">
            <button class="btn-delete" onclick="deleteTask(${t.id})" title="Delete">✕</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── HELPERS ───────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m)-1]} ${parseInt(d)}`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── INIT ──────────────────────────────────────────────────
  render();
</script>
</body>
</html>
